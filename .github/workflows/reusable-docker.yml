name: Docker build & push

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string

      tag:
        type: string
        required: true

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
      DOCKER_TAG: ${{ inputs.tag }}

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub PAT
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build the docker image
        run: |
          docker build \
          -t ${{ vars.DOCKERHUB_USER }}/${{ inputs.image_name }}:$DOCKER_TAG \
          -t ${{ vars.DOCKERHUB_USER }}/${{ inputs.image_name }}:latest .

      - name: Push to Docker Hub
        #if: github.ref == 'refs/heads/main'
        #continue-on-error: false
        run: |
          docker push ${{ vars.DOCKERHUB_USER }}/${{ inputs.image_name }}:${DOCKER_TAG}
          docker push ${{ vars.DOCKERHUB_USER }}/${{ inputs.image_name }}:latest

      - name: Output image URL
        run: echo "Pushed $DOCKERHUB_USER/${{ inputs.image_name }}:$DOCKER_TAG"
