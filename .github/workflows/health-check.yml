name: health-check

on:
  schedule:
    - cron: "0 */1 * * *" #min hrs dayofmonth month dayofweek

  workflow_dispatch:
    inputs:
      image_name:
        required: true
        type: string
        default: github-actions-capstone

      tag:
        required: true
        type: string
        default: "latest"

jobs:
  health-check:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
      IMAGE_NAME: ${{ inputs.image_name || 'github-actions-capstone' }}
      TAG: ${{ inputs.tag || 'latest' }}

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull latest image
        run: |
          docker pull ${{ vars.DOCKERHUB_USER }}/${{ inputs.image_name }}:${{ inputs.tag }}

      - name: Run the container in detached mode
        run: |
          docker run -d \
          --name=test-container \
          -p 5000:5000 \
          ${{ vars.DOCKERHUB_USER }}/${{ inputs.image_name }}:${{ inputs.tag }}

      - name: Wait for container to be ready
        run: sleep 5

      - name: Confirm container is running
        run: |
          docker ps
          docker logs test-container
      - name: Check health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health) || true

          if [ "$STATUS" == "200" ]; then
            RESULT="PASSED"
          else
            RESULT="FAILED"
          fi

          echo "## Health Check Report"                                                    >> $GITHUB_STEP_SUMMARY
          echo "| Field  | Value |"                                                        >> $GITHUB_STEP_SUMMARY
          echo "| ------ | ----- |"                                                        >> $GITHUB_STEP_SUMMARY
          echo "| Image  | $DOCKERHUB_USER/${{ inputs.image_name }}:${{ inputs.tag }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${RESULT} |"                                                    >> $GITHUB_STEP_SUMMARY
          echo "| HTTP   | ${STATUS} |"                                                    >> $GITHUB_STEP_SUMMARY
          echo "| Time   | $(date) |"                                                      >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |"                                            >> $GITHUB_STEP_SUMMARY

          if [ "$STATUS" != "200" ]; then
            exit 1
          fi

      - name: Print container logs on failure
        if: failure()
        run: docker logs test-container

      - name: Stop and remove container
        if: always() # ← runs even if health check fails
        run: |
          docker stop test-container
          docker rm test-container
