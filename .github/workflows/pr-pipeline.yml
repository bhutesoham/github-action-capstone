name: PR-pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  run-checks:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      run_tests: true

  pr-comment:
    runs-on: ubuntu-latest
    needs: [run-checks]
    steps:
      - name: Print a summary
        run: echo "PR checks passed for branch ${{ github.head_ref }}"
