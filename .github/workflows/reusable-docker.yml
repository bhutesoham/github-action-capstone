name: Docker build & push

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string

      tag:
        type: string
        required: true

jobs:
  docker-build-&-push:
    runs-on: ubuntu-latest

  env:
    DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
    DOCKER_TAG: ${{ github.event.workflow_run.head_sha }}

  steps:
    - name: Code checkout
      uses: actions/checkout@v4

    - name: Login to Docker Hub PAT
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USER }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build the docker image
      run: |
        docker build -t ${{ vars.DOCKERHUB_USER }}/ga-actions-capstone:$DOCKER_TAG .
        docker build -t ${{ vars.DOCKERHUB_USER }}/ga-actions-capstone:latest .

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
      # This creates the base URL: docker.io/user/repo
      images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ga-actions-capstone

    - name: Push to Docker Hub
      #if: github.ref == 'refs/heads/main'
      #continue-on-error: false
      run: |
        docker push ${{ vars.DOCKERHUB_USER }}/ga-actions-capstone:${DOCKER_TAG}
        docker push ${{ vars.DOCKERHUB_USER }}/ga-actions-capstone:latest

    - name: Output Image URL
      run: echo "The full image URL is ${{ steps.meta.outputs.tags }}"
