name: Main-pipeline

on:
  push:
    branches: [main]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - name: Set short SHA
        id: sha
        run: echo "short=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

  call-build-test:
    needs: [prepare]
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      run_tests: true

  call-docker:
    needs: [call-build-test, prepare]
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: github-actions-capstone
      tag: "latest,${{ needs.prepare.outputs.short_sha }}"

  deploy:
    needs: [call-docker]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploying image URL
        run: |
          echo "Deploying image ${{ needs.call-docker.outputs.image_url }} to production"
